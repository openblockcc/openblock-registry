name: Validate PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'registry.json'
      - 'toolchains.json'
      - 'approved/**'
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # IMPORTANT: this job runs on pull_request_target with write permissions,
      # so it must NEVER execute code from the PR. We check out the trusted base
      # branch as the workspace (scripts run from here) and pull the PR's
      # contents into a separate `pr/` dir that is only ever read as data.
      - name: Checkout base branch (trusted — runs validation)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Fetch PR contents (DATA ONLY — never executed)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run validation
        id: validate
        working-directory: scripts
        env:
          # Public reads only; the token just lifts the GitHub API rate limit so
          # the authoritative display report can resolve tags/manifests reliably.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node validate/index.js \
            --pr-registry="${{ github.workspace }}/pr/registry.json" \
            --pr-toolchains="${{ github.workspace }}/pr/toolchains.json" \
            --pr-approved-dir="${{ github.workspace }}/pr/approved" \
            --base-registry="${{ github.workspace }}/registry.json" \
            --base-toolchains="${{ github.workspace }}/toolchains.json" \
            --base-approved-dir="${{ github.workspace }}/approved" \
            --output=validation-report.md

          # Check if validation passed
          if grep -q "^## ❌" validation-report.md; then
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            // Read the report from disk rather than interpolating it into the
            // script: the authoritative display report contains backticks and
            // ${...}, which would break a template-literal substitution.
            const fs = require('fs');
            const reportPath = `${process.env.GITHUB_WORKSPACE}/scripts/validation-report.md`;
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '## ❌ PR Validation Failed\n\nValidation did not produce a report.';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('PR Validation')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

